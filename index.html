<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#F1F3F2">
  <title>Opskrifter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="header-row">
        <div>
          <h1 class="title">Opskrifter</h1>
          <p class="subtitle" id="count">Indlæser…</p>
        </div>
        <div class="header-actions">
          <button class="icon-btn" id="spin-open-btn" title="Lykkehjul" aria-label="Lykkehjul">🎲</button>
          <button class="icon-btn" id="add-open-btn" title="Tilføj opskrift" aria-label="Tilføj opskrift">+</button>
        </div>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="search-row">
      <input type="search" id="search" class="search-input" placeholder="Søg i opskrifter…" autocomplete="off">
    </div>

    <div class="filters" id="filters">
      <button class="chip chip-active" data-filter="alle">Alle</button>
      <button class="chip" data-filter="morgenmad">Morgenmad</button>
      <button class="chip" data-filter="frokost">Frokost</button>
      <button class="chip" data-filter="aftensmad">Aftensmad</button>
      <button class="chip" data-filter="dessert">Dessert</button>
      <button class="chip" data-filter="brød">Brød</button>
      <button class="chip" data-filter="kage">Kage</button>
      <button class="chip chip-fav" data-filter="favorit">♥ Favorit</button>
    </div>

    <div class="recipe-list" id="recipe-list"></div>

    <div class="empty" id="empty" hidden>
      <p>Ingen opskrifter matcher.</p>
    </div>
  </div>

  <!-- Recipe detail overlay -->
  <div class="overlay" id="overlay" hidden>
    <div class="overlay-inner" id="overlay-inner">
      <div class="overlay-topbar">
        <button class="back-btn" id="back-btn" aria-label="Tilbage">← Tilbage</button>
        <div class="detail-tools">
          <button class="tool-btn" id="edit-btn" title="Rediger">Rediger</button>
          <button class="tool-btn tool-btn-danger" id="delete-btn" title="Slet">Slet</button>
        </div>
      </div>
      <div id="recipe-detail"></div>
    </div>
  </div>

  <!-- Add/Edit modal -->
  <div class="modal" id="add-modal" hidden>
    <div class="modal-inner">
      <div class="modal-topbar">
        <h2 class="modal-title" id="add-modal-title">Tilføj opskrift</h2>
        <button class="close-btn" id="add-close-btn" aria-label="Luk">✕</button>
      </div>
      <p class="modal-hint">Indsæt hele JSON-blokken for opskriften.</p>
      <textarea id="json-input" class="json-input" placeholder='{
  "id": "min-opskrift",
  "navn": "Min opskrift",
  ...
}' spellcheck="false"></textarea>
      <div class="modal-msg" id="add-msg"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="add-cancel-btn">Annullér</button>
        <button class="btn btn-primary" id="add-save-btn">Gem</button>
      </div>
    </div>
  </div>

  <!-- Spin modal -->
  <div class="modal" id="spin-modal" hidden>
    <div class="modal-inner">
      <div class="modal-topbar">
        <h2 class="modal-title">Lykkehjulet</h2>
        <button class="close-btn" id="spin-close-btn" aria-label="Luk">✕</button>
      </div>
      <p class="modal-hint">Vælg en kategori og lad tilfældigheden bestemme.</p>
      <div class="spin-tag-picker" id="spin-tag-picker">
        <button class="chip chip-active" data-spin="alle">Alle</button>
        <button class="chip" data-spin="morgenmad">Morgenmad</button>
        <button class="chip" data-spin="frokost">Frokost</button>
        <button class="chip" data-spin="aftensmad">Aftensmad</button>
        <button class="chip" data-spin="dessert">Dessert</button>
        <button class="chip" data-spin="brød">Brød</button>
        <button class="chip" data-spin="kage">Kage</button>
        <button class="chip chip-fav" data-spin="favorit">♥ Favorit</button>
      </div>

      <div class="spin-result" id="spin-result">
        <div class="spin-placeholder">Tryk på knappen for at spinne…</div>
      </div>

      <div class="modal-actions">
        <button class="btn btn-secondary" id="spin-open-recipe-btn" hidden>Åbn opskrift</button>
        <button class="btn btn-primary" id="spin-btn">Spin</button>
      </div>
    </div>
  </div>

  <!-- Firebase SDK (compat versions for simple global usage) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <!-- App config + app -->
  <script src="firebase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
